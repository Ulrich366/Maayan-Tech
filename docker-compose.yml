version: "3.9"

# ============================================================
# MAAYAN - Docker Compose Configuration
# ============================================================

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: maayan-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./simulation:/app/simulation
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./maayan.db
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - APP_ENV=production
      - CORS_ORIGINS=http://localhost:3000
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: maayan-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  maayan_data:
    driver: local

networks:
  default:
    name: maayan-network
